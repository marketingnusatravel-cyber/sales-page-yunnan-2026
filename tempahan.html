<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borang Tempahan | Nusa Travel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" href="images/logo2.png">
  <style>
    :root {
      --primary: #004080;
      --accent: #ff9d00;
      --bg: #f4f7f6;
      --text: #333;
      --card-bg: #fff;
      --border: #e2e8f0;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .form-container {
      background: var(--card-bg);
      max-width: 600px;
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .form-header {
      background: linear-gradient(135deg, var(--primary), #00b4d8);
      padding: 40px 30px;
      text-align: center;
      color: #fff;
      position: relative;
    }

    .form-header img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: contain;
      background: #fff;
      padding: 5px;
      margin-bottom: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .form-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .form-header p {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .wa-form {
      padding: 40px 30px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--primary);
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s;
      background: #f8fafc;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 157, 0, 0.1);
    }

    .row-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(255, 157, 0, 0.3);
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 157, 0, 0.4);
    }

    .btn-submit:disabled {
      background: #e2e8f0;
      color: #94a3b8;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 20px;
    }

    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="form-header">
      <img src="images/logo2.png" alt="Nusa Travel Logo">
      <h1>Semakan Slot Pakej Yunnan</h1>
      <p>Isi butiran di bawah untuk kami semak kekosongan tiket & hotel (Database Records).</p>
    </div>

    <form id="standaloneForm" class="wa-form">
      <div class="form-group">
        <label for="fname">Muka Depan Nama (First Name)</label>
        <input type="text" id="fname" placeholder="Cth: Ahmad" required>
      </div>

      <div class="form-group">
        <label for="noPhone">Nombor Telefon (WhatsApp)</label>
        <input type="tel" id="noPhone" placeholder="Cth: 0123456789" required>
      </div>

      <div class="form-group">
        <label for="tarikhTrip">Pilihan Tarikh (Pakej Yunnan)</label>
        <select id="tarikhTrip" required>
          <option value="" disabled selected>Pilih Tarikh Anda...</option>
          <option value="25 Mac - 31 Mac (Cuti Raya)">25 Mac - 31 Mac (Cuti Raya)</option>
          <option value="28 Mei - 03 Jun (Cuti Adha)">28 Mei - 03 Jun (Cuti Adha)</option>
          <option value="Musim Bunga (Lain-lain)">Musim Bunga (Tarikh Lain)</option>
          <option value="Musim Panas (Cuti Sekolah)">Musim Panas (Cuti Sekolah Jun/Ogos)</option>
          <option value="Belum Pasti (Tanya Dulu)">Belum Pasti (Nak Tanya Dulu)</option>
        </select>
      </div>

      <div class="form-group row-group">
        <div>
          <label for="paxDewasa">Pax Dewasa</label>
          <input type="number" id="paxDewasa" min="1" value="1" required>
        </div>
        <div>
          <label for="paxKanak">Pax Kanak-kanak</label>
          <input type="number" id="paxKanak" min="0" value="0">
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <i class="fab fa-whatsapp"></i> Sahkan Tempahan & Hubungi Konsultan
      </button>

      <div class="secure-badge">
        <i class="fas fa-lock"></i> Sijil MOTAC: 8693 | Data Disulitkan (Encrypted)
      </div>
    </form>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <h2 style="color: var(--primary);">Menyimpan ke Database...</h2>
    <p style="color: #666; margin-top: 10px;">Menyambungkan anda ke Konsultan, sila tunggu.</p>
  </div>

  <script>
    const form = document.getElementById("standaloneForm");
    const submitBtn = document.getElementById("submitBtn");
    const loadingOverlay = document.getElementById("loadingOverlay");

    // Konsultan Rotator Data
    const agents = [
        { name: "Ustaz Faiz", phone: "60162879202" },
        { name: "Lin", phone: "601125612847" },
        { name: "Shiema", phone: "601116339202" },
        { name: "Ain", phone: "60143259202" },
        { name: "Naja", phone: "60149679202" },
        { name: "Fatin", phone: "60149379202" },
        { name: "Alif", phone: "60109149202" },
        { name: "MK", phone: "60107669202" }
    ];

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      // Kumpul Data Pelanggan
      const data = {
        name: document.getElementById("fname").value,
        phone: document.getElementById("noPhone").value,
        date: document.getElementById("tarikhTrip").value,
        adults: document.getElementById("paxDewasa").value,
        children: document.getElementById("paxKanak").value,
        timestamp: new Date().toISOString()
      };

      // Tunjuk Skrin Loading (Simulasi Simpan Database)
      loadingOverlay.style.display = "flex";

      // ==========================================
      // RUANGAN DATABASE (API WEBHOOK / GOOGLE SHEETS)
      // Bos boleh masukkan Link API Google Sheets (Google Apps Script) di sini
      // ==========================================
      
      try {
        /*
        // Contoh kalau bos nak tembak ke Google Sheets:
        await fetch("MASUKKAN_LINK_GOOGLE_SHEET_API_DI_SINI", {
          method: "POST",
          body: JSON.stringify(data),
          headers: { "Content-Type": "application/json" }
        });
        */
        
        // Simulasi delay (1.5 saat) seumpama tengah hantar data ke pangkalan data
        await new Promise(resolve => setTimeout(resolve, 1500));
        
      } catch (error) {
        console.error("Ralat menyimpan data:", error);
      }

      // Selesai simpan, tukar fungsi ke WhatsApp
      loadingOverlay.querySelector("h2").innerText = "Konsultan Ditemui!";
      
      // Pilih ejen rawak
      const randomAgent = agents[Math.floor(Math.random() * agents.length)];

      const message = `Hai Nusa Travel! ✈️ Saya ${data.name}.
Saya dah isi borang tempahan.

*Maklumat Semakan:*
📅 Tarikh: ${data.date}
👥 Pax: ${data.adults} Dewasa, ${data.children} Kanak-kanak
📞 No. Tel: ${data.phone}

Boleh **${randomAgent.name}** bantu saya teruskan tempahan ini?`;

      const encodedMessage = encodeURIComponent(message);
      const waUrl = `https://wa.me/${randomAgent.phone}?text=${encodedMessage}`;

      setTimeout(() => {
        window.location.href = waUrl;
      }, 800);
    });
  </script>
</body>
</html>
